<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M 100 20 L 160 50 L 160 110 C 160 140 100 180 100 180 C 100 180 40 140 40 110 L 40 50 Z" 
        fill="url(#shieldGradient)" stroke="#047857" stroke-width="2"/>
  
  <!-- Lock icon inside -->
  <g>
    <!-- Lock body -->
    <rect x="80" y="85" width="40" height="45" rx="3" fill="white" opacity="0.95"/>
    
    <!-- Lock shackle (top part) -->
    <path d="M 90 85 Q 90 60 100 60 Q 110 60 110 85" 
          fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Lock keyhole -->
    <circle cx="100" cy="105" r="4" fill="#10b981"/>
  </g>
  
  <!-- Checkmark for security -->
  <path d="M 130 55 L 140 65 L 155 50" 
        stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>